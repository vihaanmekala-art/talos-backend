version: '3.8'

services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: talos_prod
      POSTGRES_USER: talos_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talos_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    environment:
      DATABASE_URL: postgresql://talos_user:${DB_PASSWORD}@postgres:5432/talos_prod
      GROQ_API_KEY: ${GROQ_API_KEY}
      # Add other env vars your app needs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data: